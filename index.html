<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Caderno de Receitas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">

  <meta name="theme-color" content="#d97706">
</head>

<body>
  <main class="app">
    <header class="topo">
      <h1>📖 Caderno de Receitas</h1>
      <p>Receitas da família em um só lugar</p>
    </header>

    <section class="acoes">
      <input 
        type="text" 
        id="busca" 
        placeholder="Buscar por título ou categoria..."
      >

      <button id="btnFiltros">
        ⚙️ Filtros
      </button>

      <button id="btnNovaReceita">
        ➕ Nova Receita
      </button>
    </section>

    <section id="painelFiltros" class="painel-filtros escondido">
      <select id="filtroFavorita">
        <option value="">Todas as receitas</option>
        <option value="Sim">⭐ Apenas favoritas</option>
      </select>

      <select id="filtroAvaliacao">
        <option value="">Todas as avaliações</option>
        <option value="5">⭐⭐⭐⭐⭐</option>
        <option value="4">⭐⭐⭐⭐ ou mais</option>
        <option value="3">⭐⭐⭐ ou mais</option>
        <option value="2">⭐⭐ ou mais</option>
        <option value="1">⭐ ou mais</option>
      </select>
    </section>

    <section id="listaReceitas" class="lista-receitas">
      <p>Carregando receitas...</p>
    </section>
  </main>

  <section id="modalReceita" class="modal escondido">
    <div class="modal-conteudo">
      <button class="fechar" id="fecharModal">×</button>
      <div id="detalhesReceita"></div>
    </div>
  </section>

  <section id="modalFormulario" class="modal escondido">
    <div class="modal-conteudo">
      <button class="fechar" id="fecharFormulario">×</button>

      <h2>Nova Receita</h2>

      <form id="formReceita">
        <input type="text" id="titulo" placeholder="Título da receita" required>

        <input type="text" id="categorias" placeholder="Categorias. Ex: bolo, sobremesa">

        <input type="text" id="tempoMedio" placeholder="Tempo médio. Ex: 45 min">

        <input type="text" id="rendimento" placeholder="Rendimento. Ex: 8 porções">

        <textarea id="ingredientes" placeholder="Ingredientes" required></textarea>

        <textarea id="modoPreparo" placeholder="Modo de preparo" required></textarea>

        <input type="file" id="foto" accept="image/*">

        <input type="text" id="origemAutor" placeholder="Origem/Autor. Ex: Mãe, Vó, Internet">

        <select id="favorita">
          <option value="Não">Favorita? Não</option>
          <option value="Sim">Favorita? Sim</option>
        </select>

        <select id="avaliacao">
          <option value="">Avaliação</option>
          <option value="1">⭐</option>
          <option value="2">⭐⭐</option>
          <option value="3">⭐⭐⭐</option>
          <option value="4">⭐⭐⭐⭐</option>
          <option value="5">⭐⭐⭐⭐⭐</option>
        </select>

        <textarea id="observacoes" placeholder="Observações"></textarea>

        <button type="submit">
          Salvar Receita
        </button>
      </form>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
